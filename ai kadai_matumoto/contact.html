<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせ | ふわふわベーカリー></title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./css/ai kadai_matumoto.html.css">
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f7f4ef;
      color: #3e3a37;
      line-height: 1.9;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 50px 20px;
    }
    h2 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .lead {
      text-align: center;
      color: #6b645d;
      margin-bottom: 40px;
      font-size: 15px;
    }
    .form-box {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
      font-weight: 600;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d6cfc2;
      font-size: 15px;
      background: #faf8f5;
      margin-bottom: 20px;
      font-family: inherit;
    }
    textarea {
      height: 140px;
      resize: vertical;
    }
    .btn-submit {
      display: inline-block;
      padding: 12px 24px;
      background: #d8c7a1;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-submit:hover {
      background: #c9b792;
    }
    footer {
      background: #3e3a37;
      color: #fff;
      text-align: center;
      padding: 18px;
      font-size: 12px;
      margin-top: 60px;
    }
  </style>
</head>
<body>
    <header>
    <h1><a href="index.html">ふわふわベーカリー></a></h1>
    <nav>
      <a href="concept.html">こだわり</a>
      <a href="menu.html">メニュー</a>
      <a href="shop.html">店舗情報</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
    </header>
    <div class="container">
    <h2>お問い合わせ</h2>
    <p class="lead">
        ご質問やご意見など、お気軽にお寄せください。  
    </p>
    <div class="form-box">
        <form>
        <label for="name">お名前</label>
        <input type="text" id="name" placeholder="例：山田 太郎">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" placeholder="例：example@mail.com">
        <label for="type">お問い合わせ種別</label>
        <select id="type">
            <option value="">選択してください</option>
            <option value="menu">メニューについて</option>
            <option value="order">ご予約・取り置きについて</option>
            <option value="shop">店舗について</option>
            <option value="other">その他</option>
        </select>
        <label for="message">お問い合わせ内容</label>
        <textarea id="message" placeholder="お問い合わせ内容をご記入ください"></textarea>
        <button type="button" class="btn-submit">入力内容を確認する</button>
        </form>
    </div>
    </div>
    <footer>
    © 2026 ふわふわベーカリー
    </footer>
</body>
</html>
